<!doctype html>
<html lang="zh-CN">
 <head>
 <meta charset="UTF-8" />
 <meta name="viewport" content="width=device-width,initial-scale=1" />
 <title>傅里叶轮圆动画系统 - Formula Of Things</title>
 <link rel="stylesheet" href="./styles/main.css" />
 <link rel="stylesheet" href="./styles/fourier.css" />
 </head>
 <body>
 <header class="app-header">
 <h1>傅里叶轮圆动画系统</h1>
 <p class="subtitle">上传图像，提取轮廓，生成傅里叶级数动画</p>
 </header>

 <main class="fourier-layout">
 <!-- 左侧面板：上传和控制 -->
 <aside class="control-sidebar">
 <!-- 文件上传 -->
 <section class="upload-section">
 <h2>上传图像</h2>
 <div class="upload-zone" id="upload-zone">
 <input type="file" id="image-input" accept="image/*" hidden />
 <div class="upload-placeholder">
 <p>点击或拖拽上传图像</p>
 <p class="upload-hint">支持 JPG, PNG, WebP, BMP</p>
 </div>
 <img id="preview-image" alt="预览" hidden />
 </div>
 </section>

 <!-- 轮廓预览 -->
 <section class="contour-preview" id="contour-section" hidden>
 <h2>轮廓预览</h2>
 <canvas id="contour-canvas" width="200" height="200"></canvas>
 <div class="threshold-controls">
 <label>
 边缘敏感度
 <input type="range" id="threshold-slider" min="0" max="255" value="128" />
 </label>
 <button id="confirm-contour-btn" class="btn-primary">确认轮廓</button>
 </div>
 </section>

 <!-- 动画控制 -->
 <section class="animation-controls" id="animation-section" hidden>
 <h2>动画控制</h2>
 <div class="control-buttons">
 <button id="play-btn" class="btn-primary">播放</button>
 <button id="reset-btn">重置</button>
 </div>
 <div class="speed-control">
 <label>播放速度</label>
 <select id="speed-select">
 <option value="0.5">0.5x</option>
 <option value="1" selected>1x</option>
 <option value="2">2x</option>
 </select>
 </div>
 <div class="progress-control">
 <label>进度</label>
 <input type="range" id="progress-bar" min="0" max="100" value="0" />
 </div>
 <div class="status-display" id="status">就绪</div>
 </section>

 <!-- 导出面板 -->
 <section class="export-section" id="export-section" hidden>
 <h2>导出</h2>
 <div class="export-buttons">
 <button id="export-json-btn">导出 JSON</button>
 <button id="export-csv-btn">导出 CSV</button>
 <button id="export-png-btn">保存截图</button>
 </div>
 </section>
 </aside>

 <!-- 中间：动画渲染 -->
 <section class="animation-viewer">
 <div class="canvas-container">
 <canvas id="animation-canvas" width="800" height="600"></canvas>
 </div>
 </section>

 <!-- 右侧面板：公式和参数 -->
 <aside class="info-sidebar">
 <!-- 傅里叶公式 -->
 <section class="formula-section" id="formula-section" hidden>
 <h2>傅里叶级数公式</h2>
 <div class="formula-display">
 <p class="formula-eq">x(t) = a₀ + Σ[aₙcos(nt) + bₙsin(nt)]</p>
 <p class="formula-eq">y(t) = c₀ + Σ[cₙcos(nt) + dₙsin(nt)]</p>
 </div>
 <button id="copy-formula-btn">复制公式</button>
 </section>

 <!-- 参数表 -->
 <section class="parameter-section" id="parameter-section" hidden>
 <h2>参数表</h2>
 <div class="parameter-table-container">
 <table class="parameter-table" id="parameter-table">
 <thead>
 <tr>
 <th>n</th>
 <th>rₙ</th>
 <th>ωₙ</th>
 <th>φₙ</th>
 <th>能量</th>
 </tr>
 </thead>
 <tbody id="parameter-tbody">
 <!-- 动态生成 -->
 </tbody>
 </table>
 </div>
 </section>

 <!-- 统计信息 -->
 <section class="stats-section" id="stats-section" hidden>
 <h2>统计信息</h2>
 <div class="stats-grid">
 <div class="stat-item">
 <span class="stat-label">项数</span>
 <span class="stat-value" id="term-count">-</span>
 </div>
 <div class="stat-item">
 <span class="stat-label">能量占比</span>
 <span class="stat-value" id="energy-ratio">-</span>
 </div>
 <div class="stat-item">
 <span class="stat-label">轮廓点数</span>
 <span class="stat-value" id="contour-points">-</span>
 </div>
 </div>
 </section>
 </aside>
 </main>

 <script type="module">
 import { initApp } from './src/app/fourier-main.js'

 // 初始化应用
 initApp({
 mainCanvas: document.getElementById('animation-canvas'),
 previewCanvas: document.getElementById('contour-canvas'),
 formulaDisplay: document.querySelector('.formula-display'),
 parameterTable: document.getElementById('parameter-tbody'),
 status: document.getElementById('status'),
 playBtn: document.getElementById('play-btn'),
 resetBtn: document.getElementById('reset-btn'),
 speedSelect: document.getElementById('speed-select'),
 progressBar: document.getElementById('progress-bar'),
 uploadZone: document.getElementById('upload-zone'),
 imageInput: document.getElementById('image-input'),
 previewImage: document.getElementById('preview-image')
 })
 </script>
 </body>
</html>
